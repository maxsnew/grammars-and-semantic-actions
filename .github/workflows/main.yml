name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'paper/*'
      - 'notes/*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'paper/*'
      - 'notes/*'
  workflow_dispatch:

# Dependencies pinned in flake.lock
# Bump with `nix flake update` locally and commit the lock;
# or edit the lock file directly
#
# Dependencies saved in nix store and cached
#
# grammars-and-semantic-actions builds are cached and need only
# rebuild changed files
#
# Can check well-formedness of this workflow locally with act or actionlint
#   nix run nixpkgs#actionlint
#   nix run nixpkgs#act -- -j build --dryrun
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 3G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Cache library _build
        uses: actions/cache@v5
        with:
          path: ./src/_build
          key: gsa-build-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ hashFiles('src/**', 'src/grammar.agda-lib') }}
          restore-keys: |
            gsa-build-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            gsa-build-${{ runner.os }}-

      - name: Prime Nix shell
        run: nix develop --profile .nix-dev-profile --command true

      - name: Typecheck grammars-and-semantic-actions
        run: nix develop --command make -C src check
